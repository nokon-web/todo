<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admin</title>
    <style>
/* 🌐 Body Styling */
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
    text-align: center;
}
.form-box {
    background: white;
    padding: 20px;
    width: fit-content;
    margin: auto;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* 📦 Form Container */
input {
    padding: 10px;
    margin: 8px;
    width: 200px;
    border: 1px solid #ccc;
    border-radius: 6px;
    outline: none;
    transition: 0.3s;
}

/* ✨ Input Focus */
input:focus {
    border-color: #007bff;
    box-shadow: 0 0 5px rgba(0,123,255,0.3);
}

/* 🔘 Button */
button {
    padding: 10px 20px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
    margin-right: 10px;
}

/* 🔘 Button Hover */
button:hover {
    background: #0056b3;
}

/* 🧾 Heading */
h1 {
    margin-top: 30px;
    color: #333;
}

/* 📊 Table Styling */
table {
    width: 80%;
    margin: 20px auto;
    border-collapse: collapse;
    background: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    border-radius: 8px;
    overflow: hidden;
}

/* 📌 Table Header */
thead {
    background: #007bff;
    color: white;
}

th, td {
    padding: 12px;
    text-align: center;
}

/* 🔽 Row Borders */
tr {
    border-bottom: 1px solid #ddd;
}

/* 🎨 Zebra Striping */
tbody tr:nth-child(even) {
    background: #f9f9f9;
}

/* ✨ Hover Effect */
tbody tr:hover {
    background: #e6f0ff;
    transition: 0.2s;
}
.back-btn {
    display: inline-block;
    padding: 10px 20px;
    background: #28a745;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 16px;
    transition: 0.3s;
}

/* Hover effect */
.back-btn:hover {
    background: #1e7e34;
}

/* Optional: center it */
.back-btn {
    margin: 20px;
}
</style>
</head>
<body>
    <div class="form-box">
    <input id="name" placeholder="Enter name">
    <input id="department" placeholder="Enter department">
    <input id="level" placeholder="Enter level">
    <button onclick="addstudent()">Add</button>
</div>
    <h1>The list of student in table</h1>
    <table>
        <thead>
            <tr><th>Name</th><th>Department</th><th>Level</th><th>Edit/Remove</th></tr>
        </thead>
        <tbody id="tbody">
        </tbody>
    </table>
    <a href="/frontend/index.html" class="back-btn">Home page</a>
    <script src="script.js"></script>

</body>
</html>
